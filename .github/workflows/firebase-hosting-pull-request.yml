name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: React-App

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies & build
        working-directory: ./RecipeGPT2_Frontend
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: |
          echo "VITE_SERVER_URL=${VITE_SERVER_URL}" > .env
          npm ci
          npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RECIPEGPT2_5018 }}

      - name: Deploy preview to Firebase Hosting
        working-directory: ./RecipeGPT2_Frontend
        run: |
          npx firebase-tools@latest hosting:channel:deploy pr${{ github.event.pull_request.number }} \
            --project recipegpt2-5018 \
            --non-interactive
