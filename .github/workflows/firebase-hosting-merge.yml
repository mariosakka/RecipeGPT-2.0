name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: React-App

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies & build
        working-directory: ./RecipeGPT2_Frontend
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: |
          echo "VITE_SERVER_URL=${VITE_SERVER_URL}" > .env
          npm ci
          npm run build

      - name: Write Firebase service account key
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RECIPEGPT2_5018 }}' > /tmp/firebase-sa.json

      - name: Deploy to Firebase Hosting
        working-directory: ./RecipeGPT2_Frontend
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          npx firebase-tools@latest deploy --only hosting \
            --project recipegpt2-5018 \
            --non-interactive

      - name: Print deployment URLs
        run: |
          echo "=========================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "=========================================="
          echo "  Frontend (Firebase Hosting):"
          echo "    https://recipegpt2-5018.web.app"
          echo "    https://recipegpt2-5018.firebaseapp.com"
          echo "  Backend (Cloud Run):"
          echo "    ${{ vars.VITE_SERVER_URL }}"
          echo "=========================================="
