name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: React-App

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies & build
        working-directory: ./RecipeGPT2_Frontend
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: |
          echo "VITE_SERVER_URL=${VITE_SERVER_URL}" > .env
          npm ci
          npm run build

      - name: Write Firebase service account key
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RECIPEGPT2_5018 }}
        run: |
          echo "$SA_KEY" > /tmp/firebase-sa.json
          echo "--- Validating SA key file ---"
          python3 -c "import json,sys; d=json.load(open('/tmp/firebase-sa.json')); print('type:', d.get('type')); print('project:', d.get('project_id')); print('client_email:', d.get('client_email'))"

      - name: Deploy to Firebase Hosting
        working-directory: ./RecipeGPT2_Frontend
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          npx firebase-tools@latest deploy --only hosting \
            --project recipegpt2-5018 \
            --non-interactive

      - name: Update README with live URLs
        run: |
          FRONTEND_URL="https://recipegpt2-5018.web.app"
          BACKEND_URL="${{ vars.VITE_SERVER_URL }}"
          sed -i "s|https://recipegpt2-[^|]*\.web\.app|${FRONTEND_URL}|g" README.md
          sed -i "s|https://springboot-service-[^|]*\.run\.app|${BACKEND_URL}|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update live URLs in README [skip ci]"
          git push

      - name: Print deployment URLs
        run: |
          echo "=========================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "=========================================="
          echo "  Frontend (Firebase Hosting):"
          echo "    https://recipegpt2-5018.web.app"
          echo "  Backend (Cloud Run):"
          echo "    ${{ vars.VITE_SERVER_URL }}"
          echo "=========================================="
